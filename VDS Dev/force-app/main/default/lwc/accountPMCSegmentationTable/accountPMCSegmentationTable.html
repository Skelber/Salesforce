<template>
    <lightning-card variant="Narrow"  title="Segmentation" icon-name="standard:indicator_assignment" icon-size="large">

        <div >

            <!-- Header row -->
            <div class="slds-grid slds-grid_align-spread slds-border_bottom slds-text-title_bold slds-p-around_small" style="border-bottom: 1px solid #996633;">
                <div class="slds-col slds-size_1-of-12">#</div>
                <div class="slds-col slds-size_4-of-12">Parameter</div>
                <div class="slds-col slds-size_4-of-12">Value</div>
                <div class="slds-col slds-size_2-of-12 slds-text-align_right slds-align-bottom">Last Modified</div>
                <div class="slds-col slds-size_1-of-12 slds-text-align_right slds-align-bottom">
                    &nbsp;
                    <!-- <lightning-icon icon-name="utility:delete" alternative-text="Delete" title="Delete"></lightning-icon> -->
                </div>
            </div>

            <!-- Rows -->
             <div class="slds-p-around_medium">

                 <template if:true={segmentations}>
                     <template for:each={segmentations} for:item="row">
                         <div key={row.Id} class="slds-grid slds-grid_align-spread   segmentationrow">
                             <div class="slds-col slds-size_1-of-12 slds-align-middle">{row.rowNumber}</div>
                             
                             <!-- Parameter -->
                             <div class="slds-col slds-size_4-of-12 slds-align-middle">{row.SegmentationParameterName}</div>
                             
                             <!-- Value (picklist) -->
                             <div class="slds-col slds-size_4-of-12 slds-align-middle">
                                 <lightning-combobox
                                 class="small-combobox"
                                 data-id={row.Id}
                                 value={row.SegmentationParameterValue}
                                 options={row.picklistOptions}
                                 placeholder="Select value"
                                 variant="label-hidden"
                                 onchange={handleValueChange}>
                                </lightning-combobox>
                            </div>
                            
                            <!-- Last Modified -->
                            <div class="slds-col slds-size_2-of-12 slds-text-align_right slds-align-bottom">
                                {row.LastModifiedDisplay}
                            </div>
                            <div class="slds-col slds-size_1-of-12 slds-text-align_right slds-align-bottom">
                                <lightning-icon class="delete" icon-name="utility:delete" size="x-small" alternative-text="Delete" title="Delete"></lightning-icon>
                            </div>
                        </div>
                    </template>
                </template>
                
                <template if:false={segmentations}>
                    <p>No segmentations found.</p>
                </template>
            </div>

                  <!-- Save Button -->
                   <!-- <template if:true={showSaveButton}> -->
                    <footer class="slds-grid">

                        <div class="slds-p-around_small slds-col slds-size_2-of-12 footerCol slds-align_absolute-center">
                            <div class="highlight">
                                Interest: {sumInterest}
                            </div>
                        </div>
                        <div class="slds-p-around_small slds-col slds-size_2-of-12 footerCol slds-align_absolute-center">
                            <div class="highlight">
                                Potential: {sumPotential}
                            </div>
                        </div>
                        <div class="slds-p-around_small slds-col slds-size_2-of-12 footerCol slds-align_absolute-center">
                            <div class="highlight">
                                Segment: {segment} 
                            </div>
                        </div>
                        <div class="slds-p-around_small slds-col slds-size_6-of-12 slds-grid slds-grid_align-end">
                            <div>
                                <lightning-button label="Save" variant="brand" onclick={handleSave}></lightning-button>
                            </div>
                        </div>
                    </footer>
                    <!-- </template> -->

        </div>
        <template if:true={showSpinner}>
            <div class="exampleHolder">
                <lightning-spinner alternative-text="Loading" size="xx-small"></lightning-spinner>
            </div>
        </template>
    </lightning-card>
</template>
